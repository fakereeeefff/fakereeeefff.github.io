<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方浩哲 · 个人主页</title>
  <style>
    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafc;
      color: #1e293b;
      line-height: 1.6;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.1);
      padding: 2.5rem;
    }

    /* 头像 */
    .avatar {
      display: block;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 1.5rem;
      border: 4px solid white;
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
    }

    /* 姓名与标题 */
    .name {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .bio {
      text-align: center;
      font-size: 1.2rem;
      color: #475569;
      margin-bottom: 1.5rem;
    }

    /* 社交链接区域 */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .social-links a {
      color: #64748b;
      font-size: 1.6rem;
      transition: color 0.2s ease;
    }

    .social-links a:hover {
      color: #3b82f6;
    }

    /* 分割线 */
    .divider {
      width: 60px;
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      margin: 2rem auto;
    }

    /* 章节标题 */
    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title i {
      color: #3b82f6;
    }

    /* 关于段落 */
    .about-text {
      color: #334155;
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }

    /* 项目卡片网格 */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .project-card {
      background: #f8fafc;
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      border: 1px solid #eef2f6;
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.2);
      border-color: #b9d5ff;
    }

    .project-title {
      font-weight: 600;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .project-desc {
      color: #475569;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .project-link {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .project-link:hover {
      text-decoration: underline;
    }

    /* 脚注 */
    .footer {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-top: 2.5rem;
      border-top: 1px solid #eef2f6;
      padding-top: 2rem;
    }

    /* 简单的图标库 (使用 Font Awesome) */
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css');
  </style>
</head>
<body>
  <div class="container">
    <!-- 头像 (请替换为自己的图片链接) -->
    <img class="avatar" src="https://via.placeholder.com/120" alt="头像">

    <!-- 姓名与简介 -->
    <h1 class="name">方浩哲</h1>
    <div class="bio">海南大学</div>

    <!-- 社交链接 (替换为你的个人链接) -->
    <div class="social-links">
      <a href="https://github.com/你的用户名" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://twitter.com/你的用户名" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
      <a href="https://linkedin.com/in/你的用户名" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
      <a href="mailto:你的邮箱@example.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
    </div>

    <div class="divider"></div>

    <!-- 关于我部分 -->
    <h2 class="section-title"><i class="fas fa-user"></i> 关于我</h2>
    <p class="about-text">
      你好！我是方浩哲，一名海南大学学生。我享受将想法转化为简洁、高效的代码。目前专注于Web开发与开源工具。业余时间喜欢健身。
    </p>

    <!-- 精选项目展示 -->
    <h2 class="section-title"><i class="fas fa-code-branch"></i> 精选项目</h2>
    <div class="projects">
      <div class="project-card">
        <div class="project-title">项目名称 A</div>
        <div class="project-desc">一个简洁的待办事项应用，使用React和LocalStorage实现，支持深色模式。</div>
        <a href="#" class="project-link">查看项目 <i class="fas fa-arrow-right"></i></a>
      </div>
      <div class="project-card">
        <div class="project-title">项目名称 B</div>
        <div class="project-desc">基于Python Flask的天气查询API，集成第三方天气数据，提供JSON接口。</div>
        <a href="#" class="project-link">查看项目 <i class="fas fa-arrow-right"></i></a>
      </div>
      <div class="project-card">
        <div class="project-title">项目名称 C</div>
        <div class="project-desc">个人博客主题Jekyll，极简设计，专注于阅读体验。</div>
        <a href="#" class="project-link">查看项目 <i class="fas fa-arrow-right"></i></a>
      </div>
    </div>

    <div class="footer">
      © 2025 你的名字 · 由 GitHub Pages 驱动
    </div>
  </div>
</body>
</html>
